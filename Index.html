<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orbit Harvest: Neon Galaxy</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; color: #0ff; }
        canvas { display: block; }
        .ui-overlay { 
            position: fixed; top: 20px; left: 20px; pointer-events: none; 
            text-shadow: 0 0 8px #0ff; font-size: 16px; display: flex; flex-direction: column; gap: 5px;
        }
        .controls { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 8px; flex-wrap: wrap; }
        button { 
            pointer-events: auto; padding: 10px 15px; background: rgba(0, 10, 20, 0.9); 
            color: #0ff; border: 1px solid #0ff; cursor: pointer; border-radius: 4px; font-weight: bold;
            box-shadow: 0 0 5px #0ff;
        }
        button:hover { background: #0ff; color: #000; }
        #msg { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 30px; text-align: center; display: none; pointer-events: none; color: #fff;
        }
    </style>
</head>
<body>

<div class="ui-overlay">
    <div>FUEL: <span id="fuelVal">100</span>%</div>
    <div>SCORE: <span id="scoreVal">0</span></div>
</div>

<div id="msg">SINGULARITY COLLAPSE<br><small>Tap to Restart</small></div>

<div class="controls">
    <button onclick="changeZoom(0.8)">Zoom Out</button>
    <button onclick="changeZoom(1.2)">Zoom In</button>
    <button onclick="toggleTracers()" id="traceBtn">Tracers: FADE</button>
    <button onclick="location.reload()">Reset System</button>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const fuelDisplay = document.getElementById('fuelVal');
    const scoreDisplay = document.getElementById('scoreVal');
    const msg = document.getElementById('msg');

    let width, height, planets = [], dust = [], stars = [], zoom = 1.0;
    let score = 0, fuel = 100, gameOver = false, permanentTracers = false;
    let audioCtx = null;

    const G = 150;
    const WELL_MASS = 220;
    const EVENT_HORIZON = 25;
    const SOFTENING = 40;
    
    let drag = { active: false, start: {x:0, y:0}, end: {x:0, y:0} };

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playNote(freq, dur, type="sine") {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    function createStars() {
        stars = [];
        for(let i=0; i<500; i++) {
            stars.push({
                x: (Math.random() - 0.5) * 4000,
                y: (Math.random() - 0.5) * 4000,
                brightness: Math.random()
            });
        }
    }

    class Planet {
        constructor(x, y, vx, vy) {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy;
            this.lastX = x; this.lastY = y;
            // Vibrant random colors
            this.hue = Math.random() * 360;
            this.color = `hsl(${this.hue}, 100%, 60%)`;
            this.glow = `hsl(${this.hue}, 100%, 80%)`;
        }
        update() {
            this.lastX = this.x; this.lastY = this.y;
            let dx = -this.x, dy = -this.y;
            let distSq = dx*dx + dy*dy;
            let dist = Math.sqrt(distSq);

            if (dist < EVENT_HORIZON) {
                this.dead = true;
                playNote(60, 0.5, "sawtooth");
                fuel = Math.max(0, fuel - 15);
                return;
            }

            let force = (G * WELL_MASS) / (distSq + SOFTENING);
            this.vx += (dx / dist) * force;
            this.vy += (dy / dist) * force;
            this.x += this.vx; this.y += this.vy;

            dust.forEach(d => {
                if (!d.collected && Math.hypot(this.x - d.x, this.y - d.y) < 25) {
                    d.collected = true;
                    score += 10;
                    fuel = Math.min(100, fuel + 7);
                    playNote(200 + (this.hue), 0.15, "triangle");
                }
            });
        }
        draw() {
            ctx.shadowBlur = permanentTracers ? 0 : 5;
            ctx.shadowColor = this.color;
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 3 / zoom;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(this.lastX, this.lastY);
            ctx.lineTo(this.x, this.y);
            ctx.stroke();
            
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(this.x, this.y, 2.5/zoom, 0, 7); ctx.fill();
        }
    }

    class Dust {
        constructor() {
            let ang = Math.random() * Math.PI * 2;
            let rad = 100 + Math.random() * 1200;
            this.x = Math.cos(ang) * rad;
            this.y = Math.sin(ang) * rad;
            this.collected = false;
        }
        draw() {
            ctx.fillStyle = '#ff0';
            ctx.shadowBlur = 10; ctx.shadowColor = "#ff0";
            ctx.beginPath(); ctx.arc(this.x, this.y, 2 / zoom, 0, 7); ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    function resize() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        ctx.fillStyle = 'black'; ctx.fillRect(0,0,width,height);
    }

    function changeZoom(factor) {
        zoom *= factor;
        // Refresh background on zoom to prevent smearing
        ctx.setTransform(1,0,0,1,0,0);
        ctx.fillStyle = 'black'; ctx.fillRect(0,0,width,height);
    }

    function toggleTracers() {
        permanentTracers = !permanentTracers;
        document.getElementById('traceBtn').innerText = permanentTracers ? "Tracers: PERM" : "Tracers: FADE";
    }

    const getPos = (e) => ({
        x: ((e.touches ? e.touches[0].clientX : e.clientX) - width/2) / zoom,
        y: ((e.touches ? e.touches[0].clientY : e.clientY) - height/2) / zoom
    });

    canvas.onmousedown = canvas.ontouchstart = (e) => {
        if (gameOver) { location.reload(); return; }
        initAudio();
        drag.active = true; drag.start = getPos(e); drag.end = drag.start;
    };
    window.onmousemove = window.ontouchmove = (e) => { if (drag.active) drag.end = getPos(e); };
    window.onmouseup = window.ontouchend = () => {
        if (!drag.active || fuel < 5) return;
        drag.active = false;
        fuel -= 10;
        const vx = (drag.start.x - drag.end.x) * 0.05;
        const vy = (drag.start.y - drag.end.y) * 0.05;
        planets.push(new Planet(drag.start.x, drag.start.y, vx, vy));
    };

    function animate() {
        ctx.setTransform(1,0,0,1,0,0);
        
        // Permanent mode uses almost no clear, Fading uses a light black wash
        ctx.fillStyle = permanentTracers ? 'rgba(0, 0, 0, 0.001)' : 'rgba(0, 0, 0, 0.1)';
        ctx.fillRect(0, 0, width, height);
        
        ctx.translate(width/2, height/2);
        ctx.scale(zoom, zoom);

        // Render Background Stars
        ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
        stars.forEach(s => {
            ctx.beginPath(); ctx.arc(s.x, s.y, (s.brightness * 2)/zoom, 0, 7); ctx.fill();
        });
        
        // Render Central Singularity
        ctx.shadowBlur = 15; ctx.shadowColor = "#0ff";
        ctx.fillStyle = '#000'; ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2/zoom;
        ctx.beginPath(); ctx.arc(0, 0, EVENT_HORIZON, 0, 7); ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;

        if (dust.length < 50) dust.push(new Dust());
        dust = dust.filter(d => !d.collected);
        dust.forEach(d => d.draw());

        planets = planets.filter(p => !p.dead);
        planets.forEach(p => { p.update(); p.draw(); });

        if (drag.active) {
            ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.setLineDash([5, 5]);
            ctx.beginPath(); ctx.moveTo(drag.start.x, drag.start.y); ctx.lineTo(drag.end.x, drag.end.y); ctx.stroke();
            ctx.setLineDash([]);
        }

        fuelDisplay.innerText = Math.floor(fuel);
        scoreDisplay.innerText = score;

        if (fuel <= 0 && planets.length === 0) {
            gameOver = true;
            msg.style.display = 'block';
        }

        requestAnimationFrame(animate);
    }

    window.onload = () => { resize(); createStars(); animate(); };
    window.onresize = resize;
</script>
</body>
</html>
